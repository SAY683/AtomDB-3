<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AtomDB 管理面板</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); padding: 20px;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
  }
  h1 { font-size: 24px; font-weight: 600; }
  h1 span { color: var(--accent); }
  .badge {
    display: inline-block; padding: 4px 12px; border-radius: 12px;
    font-size: 12px; font-weight: 500;
  }
  .badge.ok { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge.err { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge.warn { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .toolbar {
    display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
  }
  input, button {
    padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 14px;
  }
  input { flex: 1; min-width: 200px; }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  button:hover { background: #1c2333; border-color: var(--accent); }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { background: #79c0ff; }
  .stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; text-align: center;
  }
  .stat-card .num { font-size: 28px; font-weight: 700; }
  .stat-card .label { font-size: 12px; color: var(--muted); margin-top: 4px; }
  table {
    width: 100%; border-collapse: collapse;
    background: var(--card); border-radius: 8px; overflow: hidden;
  }
  th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
  th { font-size: 12px; text-transform: uppercase; color: var(--muted); font-weight: 600; }
  tr:hover td { background: rgba(88,166,255,0.04); }
  .uuid { font-family: monospace; font-size: 12px; color: var(--muted); }
  .actions { display: flex; gap: 8px; }
  .actions a {
    color: var(--accent); text-decoration: none; font-size: 13px;
  }
  .actions a:hover { text-decoration: underline; }
  .empty {
    text-align: center; padding: 48px; color: var(--muted);
  }
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 12px 20px; border-radius: 8px; background: var(--card);
    border: 1px solid var(--border); font-size: 14px;
    display: none; animation: fadeIn 0.3s;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 768px) {
    th, td { padding: 8px 10px; font-size: 13px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><span>Atom</span>DB 管理面板</h1>
    <div>
      <span class="badge ok" id="healthBadge">检查中…</span>
    </div>
  </header>

  <div class="stats">
    <div class="stat-card"><div class="num" id="totalCount">-</div><div class="label">数据库总数</div></div>
    <div class="stat-card"><div class="num" id="hashedCount">-</div><div class="label">已缓存</div></div>
    <div class="stat-card"><div class="num" id="healthyCount">-</div><div class="label">健康</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="搜索名称 / UUID / 端口…" oninput="filterTable()">
    <button onclick="refreshData()">⟳ 刷新</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>名称</th>
        <th>UUID</th>
        <th>Hash</th>
        <th>端口</th>
        <th>缓存</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="6" class="empty"><span class="spinner"></span> 加载中…</td></tr>
    </tbody>
  </table>
</div>

<div class="toast" id="toast"></div>

<script>
let allData = [];

async function refreshData() {
  const tb = document.getElementById('tableBody');
  tb.innerHTML = '<tr><td colspan="6" class="empty"><span class="spinner"></span> 加载中…</td></tr>';

  try {
    // 健康检查
    const healthRes = await fetch('/health');
    const health = await healthRes.json();
    const badge = document.getElementById('healthBadge');
    if (health.success && health.data?.status === 'healthy') {
      badge.className = 'badge ok';
      badge.textContent = '● 服务正常';
    } else {
      badge.className = 'badge warn';
      badge.textContent = '● 降级运行';
    }

    // 数据库列表
    const res = await fetch('/api/v1/databases');
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    allData = json.data || [];

    // 统计
    document.getElementById('totalCount').textContent = allData.length;
    document.getElementById('hashedCount').textContent = allData.filter(d => d.cache === 'hit').length;
    document.getElementById('healthyCount').textContent = allData.filter(d => d.hash?.length > 0).length;

    filterTable();
  } catch (e) {
    tb.innerHTML = `<tr><td colspan="6" class="empty">⚠️ 加载失败: ${e.message}</td></tr>`;
    showToast('加载失败: ' + e.message, true);
  }
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allData.filter(d =>
    d.name?.toLowerCase().includes(q) ||
    d.uuid?.toLowerCase().includes(q) ||
    d.port?.includes(q) ||
    d.hash?.toLowerCase().includes(q)
  );
  renderTable(filtered);
}

function renderTable(data) {
  const tb = document.getElementById('tableBody');
  if (!data.length) {
    tb.innerHTML = '<tr><td colspan="6" class="empty">📭 无匹配数据</td></tr>';
    return;
  }
  tb.innerHTML = data.map(d => {
    const cacheLabel = d.cache === 'hit'
      ? '<span class="badge ok">已缓存</span>'
      : '<span class="badge warn">未缓存</span>';
    return `<tr>
      <td><strong>${esc(d.name)}</strong></td>
      <td class="uuid">${esc(d.uuid)}</td>
      <td class="uuid">${esc(d.hash?.slice(0, 24))}…</td>
      <td>${esc(d.port)}</td>
      <td>${cacheLabel}</td>
      <td class="actions">
        <a href="/dl/${encodeURIComponent(d.name)}" target="_blank">下载</a>
      </td>
    </tr>`;
  }).join('');
}

function esc(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = isError ? 'var(--red)' : 'var(--green)';
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3500);
}

// 自动加载
refreshData();
// 每 30 秒自动刷新
setInterval(refreshData, 30000);
</script>
</body>
</html>
